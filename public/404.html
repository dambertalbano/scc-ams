<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React Router</title>
    <script type="text/javascript">
      (function () {
        var pathSegmentsToKeep = 1;
        var l = window.location;
        var newPathname =
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .split("/")
            .slice(pathSegmentsToKeep + 1)
            .join("/")
            .replace(/&/g, "~and~");
        var newSearch = l.search
          ? "&" + l.search.slice(1).replace(/&/g, "~and~")
          : "";
        var newUrl =
          l.protocol + "//" + l.host + newPathname + newSearch + l.hash;
        l.replace(newUrl);
      })();
    </script>
  </head>
  <body></body>
</html>
